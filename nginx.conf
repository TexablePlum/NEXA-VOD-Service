events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Upstream definitions (internal services)
    upstream drm-server {
        server drm-server:8080;
    }

    upstream content-server {
        server content-server:8080;
    }

    # HTTP Server (redirect to HTTPS)
    server {
        listen 80;
        server_name localhost;

        # Od razu przekierowujemy HTTP do HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server 
    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Health check endpoint
        # 1. Gateway Health
        location /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"Healthy","checks":[{"name":"gateway","status":"Healthy","description":"Nexa Gateway is running","duration":0}],"totalDuration":0}';
        }

        # 2. DRM Server Health (Proxy)
        location /health/drm {
            proxy_pass http://drm-server/health;
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_send_timeout 2s;
            proxy_read_timeout 2s;
        }

        # 3. Content Server Health (Proxy)
        location /health/content {
            proxy_pass http://content-server/health;
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_send_timeout 2s;
            proxy_read_timeout 2s;
        }

        # Route /api/catalog (case-insensitive) to ContentServer
        location ~* ^/api/catalog(/.*)?$ {
            proxy_pass http://content-server$request_uri;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Security - CSP for API
            add_header Content-Security-Policy "default-src 'self';" always;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Route /api/streaming (case-insensitive) to ContentServer
        location ~* ^/api/streaming(/.*)?$ {
            proxy_pass http://content-server$request_uri;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Important for video streaming - enable range requests
            proxy_http_version 1.1;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;

            # Security - CSP for API
            add_header Content-Security-Policy "default-src 'self';" always;

            # Timeouts (longer for video streaming)
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Buffering off for streaming
            proxy_buffering off;
        }

        # Route /api/* to DrmLicenseServer (catch-all, must be AFTER specific Content routes)
        location /api/ {
            proxy_pass http://drm-server/api/;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Security - CSP for API
            add_header Content-Security-Policy "default-src 'self';" always;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Route /swagger to DrmLicenseServer (Development only)
        location /swagger/ {
            proxy_pass http://drm-server/swagger/;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Relaxed CSP for Swagger UI - allow all needed resources
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self';" always;
        }

        # Swagger static resources
        location /_content/ {
            proxy_pass http://drm-server/_content/;
            proxy_set_header Host $host;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;" always;
        }

        location /_framework/ {
            proxy_pass http://drm-server/_framework/;
            proxy_set_header Host $host;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
        }

        # Route /content-swagger to ContentServer Swagger (Development only)
        location /content-swagger/ {
            proxy_pass http://content-server/swagger/;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Relaxed CSP for Swagger UI - allow all needed resources
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self';" always;
        }

        # Route /content/* to ContentServer
        location /content/ {
            proxy_pass http://content-server/content/;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Important for video streaming - enable range requests
            proxy_http_version 1.1;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;

            # Security - CSP for content streaming
            add_header Content-Security-Policy "default-src 'self';" always;

            # Timeouts (longer for video streaming)
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Buffering off for streaming
            proxy_buffering off;
        }

        # Root endpoint - info
        location = / {
            add_header Content-Type application/json;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
            return 200 '{"service":"NEXA VOD API Gateway","version":"1.0","endpoints":{"/api":"DRM License Server","/content":"Content Streaming Server"}}\n';
        }
    }


}
