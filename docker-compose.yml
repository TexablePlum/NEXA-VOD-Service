services:
  # Nginx Reverse Proxy - Single entry point
  nginx:
    image: nginx:alpine
    container_name: nexa-gateway
    ports:
      - "80:80"
      # - "443:443"  # Uncomment for HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./ssl:/etc/nginx/ssl:ro  # Uncomment for HTTPS with certs
    depends_on:
      - drm-server
      - content-server
    networks:
      - nexa-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: nexa-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexa-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nexa-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  drm-server:
    build:
      context: .
      dockerfile: src/DrmLicenseServer/Dockerfile
    container_name: nexa-drm-server
    env_file:
      - .env
    # SECURITY: No external port - only accessible via nginx
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Redis__ConnectionString=redis:6379,password=${REDIS_PASSWORD:-}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Security__CekMasterKey=${MASTER_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexa-network
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  content-server:
    build:
      context: .
      dockerfile: src/ContentServer/Dockerfile
    container_name: nexa-content-server
    env_file:
      - .env
    # SECURITY: No external port - only accessible via nginx
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Redis__ConnectionString=redis:6379,password=${REDIS_PASSWORD:-}
      - ContentStorage__BasePath=/app/content
      # JWT Configuration - SAME as DrmLicenseServer for validation!
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nexa-network
    volumes:
      - ./content/storage:/app/content
    restart: unless-stopped

networks:
  nexa-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
