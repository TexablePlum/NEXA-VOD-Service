<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>NEXA Player</title>
    <!-- Load Shaka Player from CDN for now, or local if available -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.0/shaka-player.compiled.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        video {
            width: 100%;
            height: 100%;
        }
        #error-display {
            display: none;
            color: #ff4444;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <video id="video"
           width="640"
           poster="//shaka-player-demo.appspot.com/assets/poster.jpg"
           controls autoplay></video>
    
    <div id="error-display"></div>

    <script src="player.js"></script>
</body>
</html>
