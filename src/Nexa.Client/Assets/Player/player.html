<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>NEXA Player</title>
    <!-- Load Shaka Player UI from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.10/dist/shaka-player.ui.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.10/dist/controls.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Ensure the UI container fills the screen */
        .shaka-video-container {
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
        }

        #error-display {
            display: none;
            color: #ff4444;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>
    <!-- Shaka UI expects a container -->
    <div data-shaka-player-container style="width:100%;height:100%">
        <video data-shaka-player id="video" style="width:100%;height:100%" autoplay></video>
    </div>

    <div id="error-display"></div>

    <script src="player.js"></script>
</body>

</html>
